<!-- jugador-card.component.html -->
<div class="inazuma-card relative max-w-sm w-full rounded-2xl overflow-hidden shadow-2xl transform transition-all duration-300 hover:-translate-y-2 hover:shadow-inazuma">
  <!-- Fondo dinámico con patrón de campo y rayos -->
  <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-indigo-800 to-blue-900 opacity-95"></div>
  <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg...')] opacity-10"></div> <!-- patrón de césped -->
  
  <!-- Contenido principal (z-index) -->
  <div class="relative z-10 p-5">
    <!-- Cabecera: nombre y rating tipo "Power" -->
    <div class="flex justify-between items-start mb-4">
      <h3 class="text-2xl font-black uppercase tracking-wider text-white drop-shadow-md" style="text-shadow: 2px 2px 0 #FF8C00;">
        {{ jugador.name }}
      </h3>
      <div class="bg-yellow-400 rounded-full px-3 py-1 flex items-center gap-1 shadow-inner">
        <span class="text-yellow-900 text-lg">⚡</span>
        <span class="font-bold text-gray-800 text-xl">{{ jugador.rating }}</span>
      </div>
    </div>
    <!-- Stats con barras tipo "Power Gauge" -->
    <div class="space-y-3 mb-5">
      <div>
        <div class="flex justify-between text-xs text-white font-bold mb-1">
          <span class="flex items-center gap-1"><span class="text-red-400">⚔️</span> ATAQUE</span>
          <span>{{ jugador.attack }}</span>
        </div>
        <div class="w-full h-3 bg-gray-800/80 rounded-full overflow-hidden shadow-inner">
          <div class="h-full bg-gradient-to-r from-red-500 to-orange-400 rounded-full transition-all duration-500" 
               [style.width.%]="jugador.attack"></div>
        </div>
      </div>
      <div>
        <div class="flex justify-between text-xs text-white font-bold mb-1">
          <span class="flex items-center gap-1"><span class="text-green-400">🛡️</span> DEFENSA</span>
          <span>{{ jugador.defense }}</span>
        </div>
        <div class="w-full h-3 bg-gray-800/80 rounded-full overflow-hidden shadow-inner">
          <div class="h-full bg-gradient-to-r from-green-500 to-emerald-400 rounded-full transition-all duration-500" 
               [style.width.%]="jugador.defense"></div>
        </div>
      </div>
    </div>

    <!-- Estado del equipo con estilo "contrato" -->
    <div class="flex items-center justify-between mt-2 pt-3 border-t border-white/20">
      <div class="flex items-center gap-2">
        <span class="text-cyan-300 text-sm font-bold">🏟️ EQUIPO</span>
        <span class="text-sm font-black" 
              [class.text-green-400]="jugador.teamId !== null" 
              [class.text-yellow-300]="jugador.teamId === null">
          {{ jugador.teamId !== null ? 'ID: ' + jugador.teamId : 'SIN EQUIPO' }}
        </span>
      </div>
      <button class="relative overflow-hidden group bg-gradient-to-r from-yellow-500 to-orange-600 hover:from-yellow-600 hover:to-orange-700 text-white font-bold py-1.5 px-4 rounded-full text-xs uppercase tracking-wider shadow-md transition-all duration-200">
        <span class="relative z-10">{{ jugador.teamId === null ? '✚ INCORPORAR' : '⚡ LIBERAR' }}</span>
        <span class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity"></span>
      </button>
    </div>

    <!-- Adorno rayo esquina -->
    <div class="absolute -bottom-1 -right-5 text-yellow-400/40 text-8xl select-none">⚡</div>
  </div>
</div>
