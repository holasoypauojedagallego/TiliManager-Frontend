<ion-card class="bg-[#e5d570] max-w-92 h-48  border-blue-900 rounded-2xl p-2 transition-transform duration-200 hover:scale-101">
  <div class="absolute -left-1 bottom-0.5 bg-blue-900 w-3.5 h-full overflow-hidden"></div>
  <div class="absolute -right-1 bottom-0.5 bg-blue-900 w-3.5 h-full overflow-hidden"></div>
  
  <div class="flex items-center justify-between">
    <img src="../../../assets/img-Players/{{jugador.name.split(' ')[0]}}.png" class="w-15 rounded-md text-[11px]" alt="Image: {{jugador.name.split(' ')[0]}}">

    <h2 class="text-xl text-white">
      {{ jugador.name }}
    </h2>

    <span class="bg-cyan-400 text-black font-bold px-1 py-1 mr-0.5 rounded-full text-sm">
      ⭐ {{ jugador.rating }}
    </span>
  </div>

  <div class="m-auto justify-center w-[95%] mt-3 space-y-3">

    <div>
      <div class="flex justify-between text-sm font-semibold text-gray-900 mb-0.5">
        <span>Ataque</span>
        <span>{{ jugador.attack }}</span>
      </div>
      <div class="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
        <div 
          class="h-full bg-orange-500 rounded-3"
          [style.width.%]="jugador.attack">
        </div>
      </div>
    </div>

    <div>
      <div class="flex justify-between text-sm font-semibold text-gray-900 mb-1">
        <span>Defensa</span>
        <span>{{ jugador.defense }}</span>
      </div>
      <div class="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
        <div 
          class="h-full bg-blue-500 rounded-full"
          [style.width.%]="jugador.defense">
        </div>
      </div>
    </div>

  </div>

  <div class="mt-2 text-sm text-center">
    @if (jugador.teamId) {
      <span class="text-gray-700">Equipo ID: {{ jugador.teamId }}</span>
    } @else {
      <span class="text-gray-600 font-semibold">Sin equipo</span>
    }
  </div>

</ion-card>
