<app-header/>
<ion-content [fullscreen]="true" class="ion-padding">
  <div class="ion-padding">
    <h2>Próximos Partidos</h2>
    <p>Elige tu simulador favorito y empieza a jugar.</p>
  </div>

  <ion-grid class="p-2">
    <ion-row class="gap-3">
      <ion-col size="12" size-md="5.935">
        <ion-card routerLink="/partido" class="animate-saltos-hover active:scale-90 duration-75">
          <img alt="Prueba Partido" src="https://ionicframework.com/docs/img/demos/card-media.png" class="overflow-hidden"/>
          <ion-card-header>
            <ion-card-title>Prueba Partido</ion-card-title>
            <ion-card-subtitle>Prueba Partido</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            Es una prueba de un partido.
          </ion-card-content>
          <ion-button fill="clear">Jugar ahora</ion-button>
        </ion-card>
      </ion-col>

      <ion-col size="12" size-md="5.935">
        <ion-card routerLink="/equipo">
          <img alt="Liga de Estrategia" src="https://ionicframework.com/docs/img/demos/card-media.png" />
          <ion-card-header>
            <ion-card-title>Gestionar Equipo</ion-card-title>
            <ion-card-subtitle>Equipo</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            Gestiona tu propio equipo y llévalo a la gloria en la Champions.
          </ion-card-content>
          <ion-button fill="clear" color="secondary">Gestionar equipo</ion-button>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-list lines="none" class="ion-margin-top">
    <ion-list-header>
      <ion-label>Categorías Populares</ion-label>
    </ion-list-header>
    <ion-item button>
      <ion-label>Torneos Online</ion-label>
    </ion-item>
    <a routerLink="/login" class="p-1">Login</a>
  </ion-list>

</ion-content>
