<app-header title="Equipo" [returnBack]="true" />

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="flex flex-col lg:flex-row gap-6 justify-around" cdkDropListGroup>
    
    <div class="w-full max-w-169.5 content-center shrink-0">
      <div class="example-list">
        @for (player of equipo().players; track player.id; let i = $index) {
          <div cdkDropList [cdkDropListData]="i" (cdkDropListDropped)="drop($event)" class="drop-slot">
            <div class="w-23 sm:w-25 hover:cursor-grab focus:cursor-grabbing" cdkDrag>
              <div *cdkDragPlaceholder class="cdk-drag-placeholder"></div>
              <app-jugador-mini-card [jugador]="player" [totalJugadores]="equipo().players.length" (onVender)="venderJugador($event)"/>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="w-full p-1">
  <h2 class="text-center italic">{{equipo().name}}</h2>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 justify-items-center mt-4 sm:mt-3 xl:mt-0">
    
    @for (player of equipo().players; track player.id; let i = $index) {
      
      @if (i === 0) {
        <div class="col-span-full w-full">
          <h4 class="font-bold uppercase tracking-widest border-b sm:pl-3">Portero</h4>
        </div>
      }

      @if (i === 1) {
        <div class="col-span-full w-full">
          <h4 class="font-bold uppercase tracking-widest border-b sm:pl-3">Defensas</h4>
        </div>
      }

      @if (i === 3) {
        <div class="col-span-full w-full">
          <h4 class="font-bold uppercase tracking-widest border-b sm:pl-3">Mediocentros</h4>
        </div>
      }

      @if (i === 6) {
        <div class="col-span-full w-full">
          <h4 class="font-bold uppercase tracking-widest border-b sm:pl-3">Delantero</h4>
        </div>
      }

      <app-jugador-mini-card [jugador]="player" [totalJugadores]="equipo().players.length" (onVender)="venderJugador($event)"/>
      
    }
  </div>
</div>

  </div>
</ion-content>
