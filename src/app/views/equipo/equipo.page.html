<app-header title="Equipo" />

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="example-list" cdkDropList cdkDropListOrientation="mixed" (cdkDropListDropped)="drop($event)">

          <div class="w-26.5 hover:cursor-grab focus:cursor-grabbing" cdkDrag>
            <app-jugador-mini-card [jugador]="player"  />
          </div>

      }
    </div>
</ion-content>
